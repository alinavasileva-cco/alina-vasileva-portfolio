  <text class="label" x="120" y="858">ПРОИЗВОДСТВО КОНТЕНТА</text>
  <text class="big" x="668" y="794">0,4</text>
  <text class="big" x="838" y="794">0,86</text>
  <text class="label" x="670" y="844">КОНВЕРСИЯ САЙТА</text>
