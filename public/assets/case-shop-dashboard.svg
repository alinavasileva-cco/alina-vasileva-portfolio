  <rect class="card" x="706" y="202" width="205" height="112" rx="24"/>
  <rect class="card" x="142" y="482" width="142" height="158" rx="22"/>
  <rect class="card" x="314" y="482" width="142" height="158" rx="22"/>
  <rect class="card" x="486" y="482" width="142" height="158" rx="22"/>
  <rect class="card" x="658" y="482" width="142" height="158" rx="22"/>
  <rect class="card" x="830" y="482" width="142" height="158" rx="22"/>
  <path class="line" d="M96 736C220 716 294 660 394 632S578 558 670 502 820 414 1010 362"/>
