<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" role="img" aria-label="Создание продукта с нуля">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101318"/><stop offset=".18" stop-color="#fff"/><stop offset=".36" stop-color="#9ca4ae"/><stop offset=".56" stop-color="#fff"/><stop offset=".74" stop-color="#6b747f"/><stop offset="1" stop-color="#fbfdff"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#19d8ff"/><stop offset="1" stop-color="#79f1ff"/></linearGradient>
    <style>
      .bg{fill:#f7f9fa}.grid{stroke:#dde5e9;opacity:.55}.core{fill:url(#chrome);stroke:white;stroke-width:2;filter:drop-shadow(0 28px 64px rgba(45,55,65,.18));animation:core 5s ease-in-out infinite}.orbit{fill:none;stroke:#b9c2ca;stroke-width:2;opacity:.7}.dot{fill:#19d8ff;animation:pulse 2.6s ease-in-out infinite}.big{font:600 140px Orbitron,Arial,sans-serif;letter-spacing:-.08em;fill:url(#chrome)}.label{font:500 23px Orbitron,Arial,sans-serif;letter-spacing:.12em;fill:#4d5762}.module{fill:rgba(255,255,255,.66);stroke:#d1d9df;stroke-width:2;filter:drop-shadow(0 22px 46px rgba(45,55,65,.1));animation:module 4s ease-in-out infinite alternate}.line{fill:none;stroke:url(#cyan);stroke-width:5;stroke-linecap:round;stroke-dasharray:520;animation:draw 4s ease-in-out infinite alternate}@keyframes draw{from{stroke-dashoffset:520}to{stroke-dashoffset:0}}@keyframes pulse{50%{opacity:.25;transform:scale(1.45)}}@keyframes core{50%{transform:translateY(-12px)}}@keyframes module{from{opacity:.62;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    </style>
  </defs>
  <rect class="bg" width="1100" height="900" rx="46"/>
  <path class="grid" d="M0 120H1100M0 240H1100M0 360H1100M0 480H1100M0 600H1100M0 720H1100M160 0V900M320 0V900M480 0V900M640 0V900M800 0V900M960 0V900"/>
  <circle cx="760" cy="156" r="210" fill="#19d8ff" opacity=".13"/>
  <circle class="orbit" cx="660" cy="330" r="178"/><circle class="orbit" cx="660" cy="330" r="258"/>
  <rect class="core" x="508" y="168" width="304" height="304" rx="48"/>
  <path class="line" d="M224 684C330 615 435 548 520 456S680 262 956 142"/>
  <circle class="dot" cx="500" cy="130" r="13"/><circle class="dot" cx="834" cy="184" r="13"/><circle class="dot" cx="918" cy="390" r="13"/><circle class="dot" cx="610" cy="586" r="13"/><circle class="dot" cx="360" cy="490" r="13"/>
  <text class="big" x="120" y="372">80+%</text>
  <text class="label" x="132" y="420">МАРЖИНАЛЬНОСТЬ</text>
  <text class="big" x="144" y="684">40</text>
  <text class="label" x="154" y="730">ЛИДОВ В МЕСЯЦ</text>
  <text class="big" x="710" y="718">0 ₽</text>
  <text class="label" x="722" y="764">РЕКЛАМНЫХ ВЛОЖЕНИЙ</text>
  <rect class="module" x="122" y="790" width="170" height="64" rx="22"/><text class="label" x="168" y="832" font-size="18">IDEA</text>
  <rect class="module" x="340" y="790" width="170" height="64" rx="22"/><text class="label" x="388" y="832" font-size="18">MVP</text>
  <rect class="module" x="558" y="790" width="170" height="64" rx="22"/><text class="label" x="596" y="832" font-size="18">SALES</text>
  <rect class="module" x="776" y="790" width="170" height="64" rx="22"/><text class="label" x="822" y="832" font-size="18">UNIT</text>
</svg>
